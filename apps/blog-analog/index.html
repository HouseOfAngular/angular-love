<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Angular.love</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link type="image/x-icon" rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/styles.scss" />
    <link
      type="image/png"
      rel="icon"
      href="/favicon/favicon-32x32.png"
      sizes="32x32"
    />
    <link
      type="image/png"
      rel="icon"
      href="/favicon/favicon-16x16.png"
      sizes="16x16"
    />
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" />
    <link
      type="font/woff2"
      rel="preload"
      href="/fonts/inter-v20-latin.woff2"
      as="font"
      crossorigin="anonymous"
    />
    <link
      type="font/woff2"
      rel="preload"
      href="/fonts/inter-v20-latin-ext.woff2"
      as="font"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://www.angular.love" />
    <!-- https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=optional -->
    <link rel="stylesheet" href="/src/fonts.css" />
    <script>
      (function () {
        try {
          const localTheme = localStorage.getItem('theme');
          const theme = localTheme ? localTheme : 'dark';

          document.documentElement.setAttribute('data-theme', theme);
          if (theme === 'dark') {
            document.documentElement.classList.add('cc--darkmode');
          } else {
            document.documentElement.classList.remove('cc--darkmode');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <al-root></al-root>
    <script type="module" src="/apps/blog-analog/src/main.ts"></script>
  </body>
</html>

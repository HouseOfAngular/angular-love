@if (nodeDetails(); as nodeDetails) {
  <div class="overlay" (pointerup)="handleOverlayClick()">
    <div
      class="bottomsheet w-4/5 rounded-2xl lg:w-3/5"
      [ngClass]="{
        visible: nodeDetails !== undefined,
        hidden: nodeDetails === undefined,
      }"
      (wheel)="$event.stopPropagation()"
      (pointerup)="$event.stopPropagation()"
      (touchstart)="$event.stopPropagation()"
    >
      <al-roadmap-bottomsheet-header
        [title]="nodeDetails.title"
        [nodeType]="nodeDetails.nodeType"
      />
      <al-roadmap-bottomsheet-description
        [description]="nodeDetails.description"
        title="Descrption"
      />

      @if (angularLoveNodeDetails(); as angularLoveNodeDetails) {
        <al-roadmap-bottomsheet-description
          [description]="angularLoveNodeDetails.additionalDescription"
          [additional]="true"
          title="Before you start"
        />
        <al-roadmap-bottomsheet-creators
          [creators]="angularLoveNodeDetails.creators"
          title="Description"
        />
      }

      @if (regularNodeDetails(); as regularNodeDetails) {
        @if (!isContentInRegularNodeDetails()) {
          <!--           TO-DOcard-become-an-author -->
        } @else {
          <al-roadmap-bottomsheet-regular-content
            [contentSlugs]="regularNodeDetails.articles"
            title="Articles"
          />
          <al-roadmap-bottomsheet-regular-content
            [contentSlugs]="regularNodeDetails.movies"
            title="Movies"
          />
        }
      }
      <div>
        <h3>Share this roadmap with others</h3>
      </div>
    </div>
  </div>
}

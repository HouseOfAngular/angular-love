@if (nodeDetails(); as nodeDetails) {
  <div
    class="fixed inset-0 z-[1000] flex items-end justify-center bg-black/50"
    (click)="onClose()"
  >
    <div
      class="bottomsheet max-h-[70vh] w-4/5 overflow-y-auto rounded-t-2xl border-2 border-b-0 border-white bg-gradient-to-br from-[#100f15] to-[#3b0019] text-white lg:w-3/5"
      [ngClass]="{
        visible: nodeDetails !== undefined,
        hidden: nodeDetails === undefined,
      }"
      (click)="$event.stopPropagation()"
      (wheel)="$event.stopPropagation()"
      (pointerup)="$event.stopPropagation()"
      (touchstart)="$event.stopPropagation()"
    >
      <al-roadmap-bottomsheet-header
        [title]="nodeDetails.title"
        [nodeType]="nodeDetails.nodeType"
      />
      <al-roadmap-bottomsheet-description
        [description]="nodeDetails.description"
        title="Description"
      />

      @if (angularLoveNodeDetails(); as angularLoveNodeDetails) {
        <al-roadmap-bottomsheet-description
          [description]="angularLoveNodeDetails.additionalDescription"
          [additional]="true"
          title="Before you start"
        />
        <al-roadmap-bottomsheet-creators
          [creators]="angularLoveNodeDetails.creators"
          title="Description"
        />
      }

      @if (regularNodeDetails(); as regularNodeDetails) {
        @if (!regularNodeDetails.resources.length) {
          <div class="flex w-full justify-center pt-6">
            <button al-button (pointerdown)="navigateToAuthor()">
              Become an author
            </button>
          </div>
        } @else {
          <al-roadmap-bottomsheet-regular-content
            [resources]="regularNodeArticles()"
            title="Articles"
          />
          <al-roadmap-bottomsheet-regular-content
            [resources]="regularNodeVideos()"
            title="Movies"
          />
        }
      }
      <al-roadmap-bottomsheet-footer
        [nodeId]="nodeDetails.id"
        [language]="language()"
        title="Share this roadmap with others"
      />
    </div>
  </div>
}

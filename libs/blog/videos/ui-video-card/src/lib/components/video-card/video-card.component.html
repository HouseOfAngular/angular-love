<article class="h-full">
  <button
    type="button"
    class="group relative block w-full cursor-pointer overflow-hidden rounded-lg transition-transform hover:scale-105 motion-reduce:transition-none motion-reduce:hover:scale-100"
    [attr.aria-label]="videoPlayerTitle() + ': ' + video().title"
    (click)="playVideo.emit()"
  >
    <img
      alt=""
      class="aspect-video w-full object-cover object-center"
      [ngSrc]="thumbnailSrc()"
      (error)="onThumbnailError()"
      width="405"
      height="228"
    />

    <span
      class="absolute inset-0 flex items-center justify-center bg-black/20 transition-colors group-hover:bg-black/30"
    >
      <fast-svg
        name="play"
        aria-hidden="true"
        class="text-white drop-shadow-lg"
        size="64"
      />
    </span>
  </button>

  <div class="flex flex-col pt-4">
    <h3 class="line-clamp-2 text-2xl font-bold" [id]="video().videoId">
      {{ video().title }}
    </h3>
    <p class="line-clamp-2 text-base">
      {{ video().eventName }}
    </p>
  </div>
</article>
